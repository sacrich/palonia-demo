<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="assets/demo-base.js"></script>
    <title>Booking Summary - Palonia Hotel Group</title>
    <!-- Favicon -->
    <link rel="icon" href="assets/palonia-icon.png" type="image/x-icon">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7.20.15/babel.min.js"></script>

    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f8f9fa; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .chat-textarea {
            resize: none;
            min-height: 44px;
            max-height: 150px;
            line-height: 1.5;
            transition: height 0.1s ease;
        }
        
        .booking-link { color: #005c8a; text-decoration: none; transition: all 0.2s; }
        .booking-link:hover { text-decoration: underline; }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.45; }
            50% { opacity: 1; }
        }
        .thinking-shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 37%, #f1f5f9 63%);
            background-size: 400% 100%;
            animation: shimmer 1.15s ease-in-out infinite;
        }
        @keyframes shimmer {
            0% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .activity-top-rated {
            border: 3px solid #c5a059 !important;
            box-shadow: 0 0 0 6px rgba(197, 160, 89, 0.45), 0 16px 36px rgba(26, 34, 45, 0.18);
            transform: translateY(-4px) scale(1.02);
            z-index: 2;
        }
        @keyframes topRatedPulse {
            0%, 100% { box-shadow: 0 0 0 6px rgba(197, 160, 89, 0.4), 0 16px 36px rgba(26, 34, 45, 0.18); }
            50% { box-shadow: 0 0 0 10px rgba(197, 160, 89, 0.55), 0 20px 40px rgba(26, 34, 45, 0.22); }
        }
        .activity-top-rated { animation: topRatedPulse 1.6s ease-in-out infinite; }
        .activity-top-rated .btn-add-highlighted {
            background: #c5a059 !important;
            color: #1a222d !important;
            border-color: #c5a059 !important;
            animation: topRatedPulse 1.6s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PALONIA_DARK = "#1a222d";
        const PALONIA_GOLD = "#c5a059";
        const RESORT_IMG = "assets/hotel_1.png";
        const AGENT_ICON = "assets/palonia-icon.png";

        // Matches email offer (agenticEmailPaloniaEN.html): €5,833 → €4,958 room only
        const formatEUR = (amount) => `${amount.toLocaleString('en-US', { maximumFractionDigits: 0 })} EUR`;

        const BOOKING_DATA = {
            hotel: "Palonia Beach Resort",
            location: "Spain",
            dates: "Aug 10, 2024 - Aug 17, 2024 (7 Nights)",
            guests: "2 Adults, 3 Children (16, 14, 4)",
            room: "Premium Family Room (Connected)",
            roomDetails: {
                size: "79 m²",
                headline: "Spacious and elegant two-bedroom suite with living room, ideal for a family vacation.",
                longDesc: "This 79 m² room is the perfect option to enjoy a vacation without limits, thanks to its two superior bedrooms and a spacious living room. A space designed for all guests to feel included, with modern equipment and total comfort. Bright, elegant and carefully decorated, this room combines spaciousness and style, offering exclusive accommodation where every room becomes a unique experience.",
                images: [
                    "assets/room_1.png",
                    "assets/room_2.png",
                    "assets/room_3.png"
                ],
                amenities: [
                    { icon: 'fa-snowflake', name: 'Air conditioning' },
                    { icon: 'fa-temperature-high', name: 'Heating' },
                    { icon: 'fa-vault', name: 'Safe' },
                    { icon: 'fa-couch', name: 'Living room' },
                    { icon: 'fa-bed', name: 'Sofa bed' },
                    { icon: 'fa-border-all', name: 'Balcony/Terrace' },
                    { icon: 'fa-wind', name: 'Hairdryer' }
                ]
            },
            includedServices: [
                "All-Inclusive Board (Standard)",
                "Access to outdoor pools and solarium",
                "Free high-speed Wi-Fi",
                "Daytime and evening entertainment program",
                "Access to gym and basic sports facilities"
            ],
            basePrice: 4958,
            originalPrice: 5833,
            discount: 875,
            // Optional add-ons (email: +€120/day Premium, +€280 excursion) — added via chat / ADD TO STAY
            availableExtras: [
                { id: 'premium', name: 'Premium All-Inclusive', shortDesc: 'Themed restaurants and exclusive perks', desc: 'Adds daily access to à la carte restaurants (Italian, American, Andalusian) featuring Healthy corners and natural smoothies to the standard All-Inclusive. It also includes daily minibar restocking.', price: 840 },
                { id: 'excursion', name: 'Marshlands Excursion + Playroom', shortDesc: 'Bike/Kayak Adventure with Palonia Kids Club service', desc: '3-hour guided sports route through the marshlands for adults and teens. Being an intense activity, it includes a special playroom service and continuous care at the Palonia Kids Club for the 4-year-old girl.', price: 280 }
            ]
        };

        const WELLNESS_EXTRAS = [
            {
                id: 'early_birds',
                title: 'EARLY BIRDS SPA',
                price: 'from 12.00 EUR',
                image: 'assets/bpubr_well_027.png',
                desc: 'Start the day taking care of yourself from the calm. Enjoy a relaxing morning session with exclusive access to our thermal facilities before the resort wakes up fully.'
            },
            {
                id: 'water_circuit',
                title: 'Water Circuit',
                price: 'from 20.00 EUR',
                image: 'assets/c4_circuitodeaguas1.png',
                desc: 'Enjoy access to the jet pool, sauna, Turkish bath, and contrast showers. A complete hydrotherapy experience designed to release tension and improve circulation.'
            },
            {
                id: 'family_treat',
                title: 'FAMILY TREAT',
                price: 'from 190.00 EUR',
                image: 'assets/bpubr_well_001.png',
                shortDesc: 'A wellness getaway designed for the whole family.',
                desc: 'A wellness getaway designed for the whole family. Enjoy a complete water circuit together and let the little ones marvel at a chocolate oil massage. Meanwhile, mom and dad can choose a personalized body treatment to recharge their energy. A perfect plan to reconnect, relax, and pamper yourselves as a family.',
                includes: [
                    'Access to the water circuit for 4 people (90 minutes)',
                    'Chocolate oil massage for the kids',
                    'Choice of body treatment for the adults'
                ],
                comments: 'Pack valid for 4 people (2 adults + 2 children). Activity subject to availability. The images shown are for guidance only. Treatments may vary by season.',
                tags: ['Taxes included', 'Pay at the hotel | Flexible cancellation'],
                agentforceNote: 'Since this pack is valid for 4 people (perfect for you and the two teens), I can coordinate a complimentary Palonia Kids Club Kids Spa session for your 4-year-old at the exact same time, so everyone enjoys their morning to the fullest!'
            }
        ];

        const BEST_RATED_KIDS_ACTIVITY_ID = 'princess_lab';

        // Adaptive Website — hotel activities surfaced from conversation (same UX as wellness)
        const HOTEL_ACTIVITIES = [
            {
                id: 'fun_lounge',
                title: 'Palonia FUN Lounge',
                price: 'Included for teens 13+',
                image: 'assets/room_2.png',
                guestRating: 4.6,
                reviewCount: 1840,
                shortDesc: 'DJ sets, video games and a chill zone built for teenagers.',
                desc: 'The ultimate hangout for your 16- and 14-year-olds. Evening DJ sessions, next-gen video games, mocktail bar and supervised chill areas — included with your stay for guests 13+.',
                tags: ['Teen zone', 'Evening entertainment', 'Included in stay'],
                agentforceNote: 'Based on your children\'s ages (16 & 14), Agentforce surfaced this as a high-fit activity — no extra booking fee for teens.'
            },
            {
                id: 'princess_lab',
                title: 'Princess Laboratory',
                price: 'from 25.00 EUR / session',
                image: 'assets/room_3.png',
                guestRating: 4.9,
                reviewCount: 2140,
                shortDesc: 'Creative workshops and gentle play for the little ones.',
                desc: 'A magical space where younger children enjoy dress-up, storytelling and creative labs with certified entertainers. Sessions run throughout the day with flexible drop-off windows.',
                tags: ['Ages 3–8', 'Pay at the hotel', 'Flexible cancellation'],
                agentforceNote: 'Ideal while your teens are at the FUN Lounge or on the marshlands route — we can coordinate timing so your 4-year-old is always covered.'
            },
            {
                id: 'family_aqua',
                title: 'Family Aqua Gym',
                price: 'from 15.00 EUR / person',
                image: 'assets/hotel_1.png',
                guestRating: 4.5,
                reviewCount: 960,
                shortDesc: 'Guided pool workout for parents and active kids.',
                desc: 'A fun, low-impact aqua fitness session in the main pool complex. Perfect for active families who want to start the day moving together before breakfast.',
                tags: ['Morning activity', 'Pay at the hotel', 'All fitness levels'],
                agentforceNote: 'Matches your interest in morning wellness — pairs well with Early Birds Spa if you want a full active start to the day.'
            }
        ];

        const ADAPTIVE_WIDGET_META = {
            wellness: {
                title: 'Agentforce Wellness Recommendations',
                subtitle: 'Adaptive add-ons · Pay at the hotel',
                footnote: 'These services are charged at the hotel and do not change your room total.'
            },
            activities: {
                title: 'Agentforce Activity Recommendations',
                subtitle: 'Adaptive Website · Experiences for your family',
                footnote: 'Saved to your itinerary — payable at the hotel or included as noted.'
            }
        };

        function App() {
          const [isChatOpen, setIsChatOpen] = useState(false); 
          const [latestAddedExtra, setLatestAddedExtra] = useState(null);
          
          // Room package only (€4,958 — matches email). Premium/excursion from email flow stay here if added later.
          const [addedExtras, setAddedExtras] = useState([]);
          // Wellness & activities: pay at hotel — do NOT increase room total
          const [payAtHotelAddOns, setPayAtHotelAddOns] = useState([]);
          const [webSessionComplete, setWebSessionComplete] = useState(false);
          const [waOfferChoice, setWaOfferChoice] = useState(null);
          
          // Accordion states for main sections (compact view)
          const [isStayOpen, setIsStayOpen] = useState(false);
          const [isRoomOpen, setIsRoomOpen] = useState(false);
          const [isPriceOpen, setIsPriceOpen] = useState(false);
          
          // Carousel state
          const [currentImageIndex, setCurrentImageIndex] = useState(0);

          // Adaptive Website widgets (wellness → activities → WhatsApp handoff)
          const [activeAdaptiveWidget, setActiveAdaptiveWidget] = useState(null);
          const [expandedAdaptiveId, setExpandedAdaptiveId] = useState(null);
          const [isAdaptiveThinking, setIsAdaptiveThinking] = useState(false);
          const [highlightedActivityId, setHighlightedActivityId] = useState(null);
          const adaptiveThinkingTimeoutRef = useRef(null);
          const agentReplyTimeoutRef = useRef(null);
          const activityHighlightRef = useRef(null);

          const [messages, setMessages] = useState([]);
          const [inputText, setInputText] = useState('');
          const [isTyping, setIsTyping] = useState(false);
          const [demoStep, setDemoStep] = useState(0); 
          
          const [isSimulatingInput, setIsSimulatingInput] = useState(false);
          const [isWaitingForAgentTrigger, setIsWaitingForAgentTrigger] = useState(false);
          
          const skipInputTypingRef = useRef(false);
          const typingTimeoutRef = useRef(null);
          const textareaRef = useRef(null);
          const chatEndRef = useRef(null);
          
          const currentStepRef = useRef(0);
          useEffect(() => { currentStepRef.current = demoStep; }, [demoStep]);

          const startAdaptiveThinking = () => {
              setIsAdaptiveThinking(true);
              if (adaptiveThinkingTimeoutRef.current) clearTimeout(adaptiveThinkingTimeoutRef.current);
              adaptiveThinkingTimeoutRef.current = setTimeout(() => {
                  setIsAdaptiveThinking(false);
                  adaptiveThinkingTimeoutRef.current = null;
              }, 2000);
          };

          const confirmActivitySelection = (extra) => {
              const step = currentStepRef.current;
              if (step < 12 || extra.id !== BEST_RATED_KIDS_ACTIVITY_ID) return;
              if (payAtHotelAddOns.some(e => e.id === extra.id)) return;

              const priceNum = parseFloat(String(extra.price).replace(/[^\d.-]/g, '')) || 0;
              const newExtra = {
                  id: extra.id,
                  name: extra.title,
                  shortDesc: extra.shortDesc || 'Experience',
                  desc: extra.desc,
                  price: priceNum,
                  priceLabel: extra.price,
                  category: 'activities'
              };

              setMessages(prev => [...prev, {
                  role: 'user',
                  text: `Great — let's add **${extra.title}** for our 4-year-old.`
              }]);

              setPayAtHotelAddOns(prev => [...prev, newExtra]);
              setLatestAddedExtra(extra.title);
              setExpandedAdaptiveId(null);
              setHighlightedActivityId(null);

              setTimeout(() => {
                  setActiveAdaptiveWidget(null);
                  setMessages(prev => [...prev, {
                      role: 'agent',
                      text: `Done! **${extra.title}** is on your itinerary (pay at the hotel). Your room total stays at **€4,958**.\n\nPress **Alt** when you're ready to tell me you'd like to discuss with your husband.`
                  }]);
                  setDemoStep(13);
              }, 500);
          };

          // Function to simulate typing text into the chat input
          const startTypingInput = (fullText, nextStep) => {
              setIsSimulatingInput(true);
              skipInputTypingRef.current = false;
              let i = 0;
              const typeNextChar = () => {
                  if (skipInputTypingRef.current) {
                      setInputText(fullText);
                      setIsSimulatingInput(false);
                      setDemoStep(nextStep);
                      return;
                  }
                  if (i <= fullText.length) {
                      setInputText(fullText.substring(0, i));
                      i++;
                      typingTimeoutRef.current = setTimeout(typeNextChar, 15 + Math.random() * 15);
                  } else {
                      setIsSimulatingInput(false);
                      setDemoStep(nextStep);
                  }
              };
              typeNextChar();
          };

          useEffect(() => {
              const scrollToBottom = () => {
                  chatEndRef.current?.scrollIntoView({ behavior: "smooth", block: "end" });
              };
              
              if (isChatOpen) {
                  scrollToBottom();
                  const timeoutId = setTimeout(scrollToBottom, 150);
                  return () => clearTimeout(timeoutId);
              }
          }, [messages, isTyping, isChatOpen]);

          useEffect(() => {
              if (textareaRef.current) {
                  textareaRef.current.style.height = 'auto';
                  textareaRef.current.style.height = textareaRef.current.scrollHeight + 'px';
              }
          }, [inputText]);

          useEffect(() => {
              if (isChatOpen) {
                  if (demoStep === 0) {
                      setIsTyping(true);
                      setIsWaitingForAgentTrigger(true);
                  }
              }
          }, [isChatOpen]);

          const triggerAgentResponse = () => {
              const step = currentStepRef.current;
              setIsTyping(false);
              setIsWaitingForAgentTrigger(false);

              if (step === 0) {
                  setMessages([{ 
                    role: 'agent', 
                    text: 'Hi Sarah! 👋 Welcome to Palonia.com. You have on screen the draft of your stay with the Connected Rooms.\n\nDo you have any questions or doubts I can help you with before completing your booking?' 
                  }]);
                  setDemoStep(1);
              } else if (step === 3) {
                  setMessages(prev => [
                    ...prev, 
                    { 
                        role: 'agent', 
                        text: 'Yes! We have excellent wellness options for your mornings:\n\n• **EARLY BIRDS SPA** (from 12.00 EUR)\n• **Water Circuit** (from 20.00 EUR)\n• **FAMILY TREAT** (from 190.00 EUR)\n\nI\'ve personalized the page below based on what you just asked — this is our **adaptive website** in action. All of these are **paid at the hotel** and won\'t change your room total (€4,958).' 
                    }
                  ]);
                  setDemoStep(4);
                  setActiveAdaptiveWidget('wellness');
                  startAdaptiveThinking();
              } else if (step === 7) {
                  setMessages(prev => [
                    ...prev, 
                    { 
                        role: 'agent', 
                        text: 'Absolutely! For a family like yours I recommend:\n\n• **Palonia FUN Lounge** (included for teens 13+)\n• **Princess Laboratory** (from 25.00 EUR / session)\n• **Family Aqua Gym** (from 15.00 EUR / person)\n\nI\'ve updated the page again with activities matched to your profile — pick one to add to your itinerary.' 
                    }
                  ]);
                  setHighlightedActivityId(null);
                  setDemoStep(8);
                  setActiveAdaptiveWidget('activities');
                  startAdaptiveThinking();
              } else if (step === 10) {
                  const top = HOTEL_ACTIVITIES.find(a => a.id === BEST_RATED_KIDS_ACTIVITY_ID);
                  setIsAdaptiveThinking(false);
                  setActiveAdaptiveWidget('activities');
                  setHighlightedActivityId(BEST_RATED_KIDS_ACTIVITY_ID);
                  setMessages(prev => [...prev, {
                    role: 'agent',
                    text: `For your **4-year-old**, **${top.title}** has the highest guest rating: **${top.guestRating}/5** (${top.reviewCount.toLocaleString()} family reviews).\n\nI've highlighted it on the page — tap **Add to stay** on the highlighted card, or press **Alt** to add it for Sarah.`
                  }]);
                  setDemoStep(12);
              } else if (step === 15) {
                  setMessages(prev => [...prev, {
                    role: 'agent',
                    text: 'Of course — it\'s an important decision for the whole family. 💙\n\nWould you like me to send you a **clear summary of your offer on WhatsApp** (+34 600-***-***) so you can review it together with your husband whenever suits you?',
                    options: ['Yes, please send it to my WhatsApp', 'Not right now, thanks'],
                    type: 'wa_offer'
                  }]);
                  setDemoStep(16);
              } else if (step === 17 || step === 18) {
                  setMessages(prev => [...prev, {
                    role: 'agent',
                    text: 'Done! 📱 I\'ve just sent your **booking summary** to WhatsApp — you should see it now.\n\nReview it with your husband at your pace. I\'ll follow up there tomorrow if anything changes. Open WhatsApp to continue.',
                    type: 'whatsapp_handoff'
                  }]);
                  setDemoStep(18);
                  setWebSessionComplete(true);
              }
          };

          const queueAgentReply = (delayMs = 900) => {
              if (agentReplyTimeoutRef.current) clearTimeout(agentReplyTimeoutRef.current);
              setIsTyping(true);
              setIsWaitingForAgentTrigger(false);
              agentReplyTimeoutRef.current = setTimeout(() => {
                  agentReplyTimeoutRef.current = null;
                  triggerAgentResponse();
              }, delayMs);
          };

          const handleSendMessage = (textOverride = null) => {
            const textToSend = textOverride || inputText.trim();
            if (!textToSend) return;

            setMessages(prev => [...prev, { role: 'user', text: textToSend }]);
            setInputText('');
            
            const currentStep = currentStepRef.current;
            
            if (currentStep === 2) {
                setDemoStep(3);
                queueAgentReply();
            } 
            else if (currentStep === 6) {
                setDemoStep(7);
                queueAgentReply();
            }
            else if (currentStep === 9) {
                setDemoStep(10);
                queueAgentReply();
            }
            else if (currentStep === 14) {
                setDemoStep(15);
                queueAgentReply();
            }
          };

          const handleWaOfferSelection = (option) => {
              if (waOfferChoice) return;
              setWaOfferChoice(option);
              setMessages(prev => [...prev, { role: 'user', text: option }]);
              setInputText('');
              if (option.startsWith('Yes')) {
                  setDemoStep(17);
                  queueAgentReply();
              } else {
                  setMessages(prev => [...prev, {
                    role: 'agent',
                    text: 'No problem, Sarah. Your draft stays saved here whenever you\'re ready. I\'m always one message away.'
                  }]);
                  setDemoStep(18);
              }
          };

          // --- Adaptive add-on (wellness / activities) — pay at hotel only ---
          const handleAddToStay = (extra, widgetType) => {
              const priceNum = typeof extra.price === 'number'
                ? extra.price
                : (parseFloat(String(extra.price).replace(/[^\d.-]/g, '')) || 0);
              
              const newExtra = {
                  id: extra.id,
                  name: extra.title,
                  shortDesc: extra.shortDesc || 'Experience',
                  desc: extra.desc,
                  price: priceNum,
                  priceLabel: extra.price,
                  category: widgetType
              };

              setPayAtHotelAddOns(prev => {
                  if (prev.some(e => e.id === extra.id)) return prev;
                  return [...prev, newExtra];
              });
              setActiveAdaptiveWidget(null);
              setIsAdaptiveThinking(false);
              setHighlightedActivityId(null);
              setExpandedAdaptiveId(null);
              setLatestAddedExtra(extra.title);

              const step = currentStepRef.current;

              if (widgetType === 'wellness' && step === 4) {
                  setMessages(prev => [...prev, { 
                      role: 'agent', 
                      text: `Excellent choice, Sarah! **${extra.title}** is now on your draft itinerary.\n\nIt is **payable at the hotel** — your room total stays at **€4,958**. Press **Alt** when you're ready to ask about resort activities.` 
                  }]);
                  setDemoStep(5);
              } else if (widgetType === 'activities') {
                  confirmActivitySelection(extra);
              }
          };

          useEffect(() => {
            const handleKeyDown = (e) => {
              if (e.key === "Alt" || e.key === "Control" || e.key === "Shift" || e.key === "Meta" || e.key === "Enter") return;

              if (isWaitingForAgentTrigger) {
                  e.preventDefault();
                  triggerAgentResponse();
                  return;
              }

              if (isSimulatingInput) {
                  e.preventDefault();
                  skipInputTypingRef.current = true;
                  return;
              }

              const step = currentStepRef.current;

              if (webSessionComplete) return;

              // Send message step handlers
              if (step === 2 || step === 6 || step === 9 || step === 14) {
                  e.preventDefault();
                  handleSendMessage();
                  return;
              }

              // Typing step handlers (demo driver: Alt key)
              if (step === 1 && isChatOpen) {
                  e.preventDefault();
                  startTypingInput("Does the hotel have any relaxation service that I can enjoy in the mornings before breakfast?", 2);
              }
              else if (step === 5 && isChatOpen) {
                  e.preventDefault();
                  startTypingInput("What family activities does the resort offer in the afternoons? Something for the teens and something for our 4-year-old?", 6);
              }
              else if (step === 8 && isChatOpen) {
                  e.preventDefault();
                  startTypingInput("Of the kids' activities you showed me, which one has the best guest rating?", 9);
              }
              else if (step === 12 && isChatOpen) {
                  e.preventDefault();
                  const topActivity = HOTEL_ACTIVITIES.find(a => a.id === BEST_RATED_KIDS_ACTIVITY_ID);
                  if (topActivity) confirmActivitySelection(topActivity);
              }
              else if (step === 13 && isChatOpen) {
                  e.preventDefault();
                  startTypingInput("I love how everything looks, but I need to think about it and discuss it with my husband before committing.", 14);
              }
              else if (step === 16 && isChatOpen && !waOfferChoice) {
                  e.preventDefault();
                  handleWaOfferSelection('Yes, please send it to my WhatsApp');
              }
            };

            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [isChatOpen, isSimulatingInput, isWaitingForAgentTrigger, demoStep, webSessionComplete, waOfferChoice]);

          useEffect(() => {
              return () => {
                  if (adaptiveThinkingTimeoutRef.current) clearTimeout(adaptiveThinkingTimeoutRef.current);
                  if (agentReplyTimeoutRef.current) clearTimeout(agentReplyTimeoutRef.current);
              };
          }, []);

          useEffect(() => {
              if (highlightedActivityId && activityHighlightRef.current) {
                  activityHighlightRef.current.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
              }
          }, [highlightedActivityId]);

          const handleNextImage = (e) => {
              e.stopPropagation();
              setCurrentImageIndex((prev) => (prev + 1) % BOOKING_DATA.roomDetails.images.length);
          };

          const handlePrevImage = (e) => {
              e.stopPropagation();
              setCurrentImageIndex((prev) => (prev - 1 + BOOKING_DATA.roomDetails.images.length) % BOOKING_DATA.roomDetails.images.length);
          };

          const roomExtrasPrice = addedExtras.reduce((acc, curr) => acc + curr.price, 0);
          const payAtHotelTotal = payAtHotelAddOns.reduce((acc, curr) => acc + curr.price, 0);
          const totalPrice = BOOKING_DATA.basePrice + roomExtrasPrice;

          const renderAdaptiveWidget = () => {
              if (!activeAdaptiveWidget) return null;
              const items = activeAdaptiveWidget === 'wellness' ? WELLNESS_EXTRAS : HOTEL_ACTIVITIES;
              const meta = ADAPTIVE_WIDGET_META[activeAdaptiveWidget];

                          </div>
                          <div className="flex items-center gap-4 shrink-0">
                              {!isPriceOpen && <span className="font-bold text-[#1a222d] text-[16px]">{formatEUR(totalPrice)}</span>}
                              <div className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-[#1a222d]">
                                  <i className={`fa-solid fa-chevron-down text-[12px] transition-transform duration-300 ${isPriceOpen ? 'rotate-180' : ''}`}></i>
                              </div>
                          </div>
                      </div>

                      {isPriceOpen && (
                          <div className="p-5 pt-0 border-t border-gray-100 mt-2 fade-in">
                              
                              {/* ROOM PRICE BREAKDOWN */}
                              <div className="mt-4 mb-5 pb-5 border-b border-gray-200">
                                  <h3 className="text-[14px] font-bold text-[#1a222d] mb-3">Room 1: {BOOKING_DATA.room}</h3>
                                  <div className="flex justify-between items-end mb-3">
                                      <p className="text-[13px] font-medium text-gray-700">2 adult(s), 3 child(ren)</p>
                                      <div className="text-right">
                                          <span className="text-gray-400 line-through text-[12px] mr-2">{formatEUR(BOOKING_DATA.originalPrice)}</span>
                                          <span className="text-[15px] font-bold text-[#1a222d]">{formatEUR(BOOKING_DATA.basePrice)}</span>
                                      </div>
                                  </div>
                                  
                                  {/* Simulated daily breakdown */}
                                  <div className="text-[13px] text-gray-500 mb-3 space-y-1.5 bg-gray-50 p-3 rounded-lg border border-gray-100">
                                      <div className="flex justify-between"><span>Sat, Aug 10, 2024</span><span>800.00 EUR</span></div>
                                      <div className="flex justify-between"><span>Sun, Aug 11, 2024</span><span>750.00 EUR</span></div>
                                      <div className="flex justify-between"><span>Mon, Aug 12, 2024</span><span>660.00 EUR</span></div>
                                      <div className="flex justify-between"><span>Tue, Aug 13, 2024</span><span>640.00 EUR</span></div>
                                      <div className="flex justify-between"><span>Wed, Aug 14, 2024</span><span>640.00 EUR</span></div>
                                      <div className="flex justify-between"><span>Thu, Aug 15, 2024</span><span>740.00 EUR</span></div>
                                      <div className="flex justify-between"><span>Fri, Aug 16, 2024</span><span>728 EUR</span></div>
                                  </div>
                                  <p className="text-[10px] text-gray-500 text-right mt-2">The price per night has discounts applied</p>
                              </div>

                              {/* PAY AT HOTEL (adaptive itinerary — not in room total) */}
                              {payAtHotelAddOns.length > 0 && (
                              <div className="mb-6 pb-5 border-b border-gray-200">
                                  <h3 className="text-[14px] font-bold text-[#1a222d] mb-2 flex items-center gap-2"><i className="fa-solid fa-wand-magic-sparkles text-[#c5a059]"></i> Pay at the hotel</h3>
                                  <p className="text-[11px] text-gray-500 mb-4">Personalized via Adaptive Website — not included in room total below.</p>
                                  <div className="space-y-4">
                                      {payAtHotelAddOns.map(extra => (
                                          <div key={extra.id} className="flex justify-between items-start text-[13px] fade-in">
                                              <div>
                                                  <p className="font-bold text-[#005c8a] mb-0.5">{extra.name}</p>
                                                  <p className="text-[11px] text-gray-500">{extra.priceLabel || 'At hotel checkout'}</p>
                                              </div>
                                              {extra.price > 0 && <span className="font-bold text-[#1a222d]">{formatEUR(extra.price)}</span>}
                                              {extra.price === 0 && <span className="text-[11px] font-bold text-[#166534]">Included</span>}
                                          </div>
                                      ))}
                                  </div>
                              </div>
                              )}
                              {addedExtras.length > 0 && (
                              <div className="mb-6 pb-5 border-b border-gray-200">
                                  <h3 className="text-[14px] font-bold text-[#1a222d] mb-4">Room package add-ons</h3>
                                  <div className="space-y-4">
                                      {addedExtras.map(extra => (
                                          <div key={extra.id} className="flex justify-between items-start text-[13px] fade-in">
                                              <div>
                                                  <p className="font-bold text-[#005c8a] mb-0.5">{extra.name}</p>
                                                  <p className="text-[11px] text-gray-500">Added to room package</p>
                                              </div>
                                              <span className="font-bold text-[#1a222d]">{formatEUR(extra.price)}</span>
                                          </div>
                                      ))}
                                  </div>
                              </div>
                              )}

                              {/* DISCOUNTS */}
                              <p className="text-[11px] text-gray-500 font-bold uppercase tracking-wider mb-4">Your discounts</p>

                              <div className="space-y-3 text-[13px] text-[#1a222d] mb-5 font-medium">
                                  <div className="flex justify-between items-center">
                                      <span>my Palonia Benefits Tariff</span>
                                      <span className="text-[#166534] flex items-center gap-1.5">Applied <i className="fa-solid fa-circle-check"></i></span>
                                  </div>
                                  <div className="flex justify-between items-center">
                                      <span>10PALONIA26 Promo Code (-10%)</span>
                                      <span className="text-[#166534] flex items-center gap-1.5">Applied <i className="fa-solid fa-circle-check"></i></span>
                                  </div>
                                  <div className="flex justify-between items-center">
                                      <span>Large Family Applied (-5%)</span>
                                      <span className="text-[#166534] flex items-center gap-1.5">Applied <i className="fa-solid fa-circle-check"></i></span>
                                  </div>
                              </div>

                              <div className="bg-[#f0fdf4] border border-[#bbf7d0] text-[#166534] p-4 rounded-lg text-[13px] font-medium mb-6 leading-relaxed">
                                  Congratulations! In this booking you are saving <br/>
                                  <strong className="text-[14px]">{formatEUR(BOOKING_DATA.discount)}</strong> in the room price
                              </div>

                              {/* SUBTOTALS & TOTAL */}
                              <div className="bg-gray-50 p-5 rounded-xl border border-gray-100">
                                  <div className="mb-4 pb-4 border-b border-gray-200">
                                      <p className="text-[13px] text-[#1a222d] font-bold mb-1.5">Rooms subtotal</p>
                                      <div className="flex justify-between text-[12px] text-gray-600">
                                          <span>Taxes and fees (10%)</span>
                                          <span>{formatEUR(Math.round(BOOKING_DATA.basePrice * 0.1))}</span>
                                      </div>
                                  </div>

                                  {roomExtrasPrice > 0 && (
                                  <div className="mb-4 pb-4 border-b border-gray-200">
                                      <p className="text-[13px] text-[#1a222d] font-bold mb-1.5">Room add-ons subtotal</p>
                                      <div className="flex justify-between text-[12px] text-gray-600">
                                          <span>Taxes and fees (10%)</span>
                                          <span>{formatEUR(Math.round(roomExtrasPrice * 0.1))}</span>
                                      </div>
                                  </div>
                                  )}

                                  <div className="flex justify-between items-end mb-1">
                                      <span className="text-[16px] font-bold text-[#1a222d]">Total stay</span>
                                      <span className="text-[20px] font-bold text-[#1a222d]">{formatEUR(totalPrice)}</span>
                                  </div>
                                  <p className="text-[11px] text-gray-500 text-right">Taxes included</p>
                              </div>

                              <div className="bg-gray-50 p-5 rounded-xl border border-gray-100 mt-4 space-y-3 text-[14px]">
                                  <div className="flex justify-between font-bold text-[#1a222d]">
                                      <span>You will pay now</span>
                                      <span>{formatEUR(BOOKING_DATA.basePrice)}</span>
                                  </div>
                                  {payAtHotelAddOns.length > 0 && (
                                  <div className="flex justify-between text-gray-700 font-medium border-t border-gray-200 pt-3">
                                      <span>Experiences at the hotel (wellness & activities)</span>
                                      <span>{payAtHotelTotal > 0 ? formatEUR(payAtHotelTotal) : 'See rates'}</span>
                                  </div>
                                  )}
                              </div>
                          </div>
                      )}
                  </div>
                  
                  <button className="w-full mt-2 bg-[#1a222d] text-white font-bold py-4 rounded-xl opacity-50 cursor-not-allowed uppercase text-sm tracking-wide shadow-md hover:bg-[#2c384a] transition-colors">Confirm Booking (Pending)</button>

                </div>

                {/* --- AGENTFORCE CHAT (RIGHT PANE) --- */}
                {isChatOpen && (
                  <div className={`w-full flex flex-col bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden relative transition-all duration-700 ease-in-out h-[600px] lg:h-[calc(100vh-120px)] lg:w-[25%] min-w-[320px] lg:sticky lg:top-24 lg:self-start`}>
                    <div className="px-5 py-4 border-b border-gray-200 flex items-center justify-between bg-[#1a222d] text-white shrink-0">
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-full bg-white flex items-center justify-center shrink-0 shadow-inner overflow-hidden"><img src={AGENT_ICON} alt="Agentforce" className="w-full h-full object-cover" /></div>
                        <div><h2 className="font-bold text-[14px]">Palonia Agentforce</h2><p className="text-[10px] text-gray-300 flex items-center gap-1 opacity-80"><span className="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span> Active</p></div>
                      </div>
                      <button onClick={() => setIsChatOpen(false)} className="text-gray-300 hover:text-white transition"><i className="fa-solid fa-xmark text-lg"></i></button>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-4 space-y-5 bg-[#f6f8fc]">
                      <div className="text-center text-[10px] text-gray-400 font-bold mb-2 uppercase tracking-widest opacity-60">Continuous Session</div>
                      {messages.map((msg, index) => (
                        <div key={index} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} fade-in`}>
                          {msg.role === 'agent' && <div className="w-6 h-6 rounded-full bg-white flex items-center justify-center shrink-0 mr-2 mt-1 shadow-sm border border-gray-200 overflow-hidden"><img src={AGENT_ICON} alt="Agentforce" className="w-full h-full object-cover" /></div>}
                          <div className={`max-w-[85%] flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                            <div className={`px-3.5 py-2.5 text-[13px] leading-relaxed shadow-sm ${msg.role === 'user' ? 'bg-[#c5a059] text-white rounded-2xl rounded-tr-sm font-medium' : 'bg-white border border-gray-200 text-[#202124] rounded-2xl rounded-tl-sm'}`}>
                                <span dangerouslySetInnerHTML={{ __html: msg.text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>') }} />
                            </div>
                            {msg.options && (
                                <div className="mt-2 flex flex-col gap-1.5 w-full fade-in">
                                    {msg.options.map((opt, idx) => (
                                        <button key={idx} onClick={() => handleWaOfferSelection(opt)} className={`bg-white border ${waOfferChoice === opt ? 'border-[#1a222d] ring-1 ring-[#1a222d]' : 'border-[#c5a059]'} text-[#1a222d] hover:bg-[#fdfaf5] px-3 py-2 rounded-lg text-[12px] font-medium text-left transition flex justify-between items-center group shadow-sm disabled:opacity-80`} disabled={waOfferChoice !== null}>
                                            <span className="flex items-center gap-2"><i className={`fa-brands fa-whatsapp ${waOfferChoice === opt ? 'text-[#1a222d]' : 'text-[#25D366]'} mr-1.5`}></i>{opt}</span>
                                            <i className="fa-solid fa-chevron-right text-[10px] text-[#c5a059] opacity-0 group-hover:opacity-100 transition transform group-hover:translate-x-1"></i>
                                        </button>
                                    ))}
                                </div>
                            )}
                            {msg.type === 'whatsapp_handoff' && (
                                <a href="agenticWhatsappPaloniaModificaReservaEN.html" className="mt-2 inline-flex items-center gap-2 bg-[#25D366] hover:bg-[#1da851] text-white font-bold px-4 py-2.5 rounded-lg text-[12px] shadow-sm transition">
                                    <i className="fa-brands fa-whatsapp text-base"></i> Open WhatsApp — booking summary
                                </a>
                            )}
                          </div>
                          {msg.role === 'user' && <div className="w-6 h-6 rounded-full bg-blue-600 text-white flex items-center justify-center shrink-0 ml-2 mt-1 font-bold text-[10px] shadow-sm border border-white/20">S</div>}
                        </div>
                      ))}
                      {isTyping && (
                        <div className="flex justify-start fade-in">
                          <div className="w-6 h-6 rounded-full bg-white flex items-center justify-center shrink-0 mr-2 shadow-sm border border-gray-200 overflow-hidden"><img src={AGENT_ICON} alt="Agentforce" className="w-full h-full object-cover" /></div>
                          <div className="bg-white border border-gray-200 px-4 py-3 rounded-2xl rounded-tl-sm shadow-sm flex items-center gap-1.5">
                            <span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></span>
                            <span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></span>
                            <span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></span>
                          </div>
                        </div>
                      )}
                      <div ref={chatEndRef} />
                    </div>
                    
                    <div className="p-3 bg-white border-t border-gray-200 shrink-0">
                      <form onSubmit={(e) => { e.preventDefault(); handleSendMessage(); }} className="relative flex flex-col">
                        <div className="relative flex items-end gap-2">
                            <textarea ref={textareaRef} value={inputText} onChange={(e) => setInputText(e.target.value)} rows="1" placeholder={webSessionComplete ? "Session continued on WhatsApp" : "Type your message..."} className="chat-textarea w-full bg-gray-100 border border-transparent rounded-2xl py-2.5 pl-4 pr-12 text-[13px] text-[#202124] outline-none focus:bg-white focus:border-[#c5a059] focus:ring-2 focus:ring-[#c5a059]/20 transition-all overflow-hidden" readOnly={isSimulatingInput || webSessionComplete} />
                            <button type="submit" disabled={!inputText.trim() || isSimulatingInput || webSessionComplete} className="absolute right-1.5 bottom-1.5 p-2 bg-[#1a222d] text-white rounded-full hover:bg-[#c5a059] disabled:bg-gray-300 transition-colors shadow-sm">
                                <i className="fa-solid fa-paper-plane text-[11px] ml-[-1px]"></i>
                            </button>
                        </div>
                      </form>
                      <div className="flex items-center justify-center gap-1 mt-2 text-[10px] text-gray-400 font-medium text-center">
                        <i className="fa-solid fa-sparkles text-[#c5a059]"></i>
                        {webSessionComplete ? 'Adaptive session complete · WhatsApp' : 'Agentforce · Adaptive Website'}
                      </div>
                    </div>
                  </div>
                )}
              </main>

              {!isChatOpen && (
                <button onClick={() => setIsChatOpen(true)} className="fixed bottom-6 right-6 lg:bottom-10 lg:right-10 bg-[#1a222d] text-white p-4 rounded-full shadow-2xl hover:bg-[#2c384a] hover:scale-105 transition-all duration-300 flex items-center gap-3 z-50 group fade-in">
                  <div className="w-8 h-8 rounded-full bg-white flex items-center justify-center shrink-0 shadow-sm overflow-hidden"><img src={AGENT_ICON} alt="Agentforce" className="w-full h-full object-cover" /></div>
                  <span className="font-bold hidden sm:block max-w-0 overflow-hidden group-hover:max-w-[200px] transition-all duration-500 whitespace-nowrap text-[#c5a059]">Talk to Palonia Agentforce</span>
                  <span className="absolute top-0 right-0 w-3.5 h-3.5 bg-[#c5a059] border-2 border-[#1a222d] rounded-full animate-pulse"></span>
                </button>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
